{% extends "base.html" %}
{% block title %}Login - Meeting Room Booking{% endblock %}

{% block auth_content %}
<div class="auth-container">
    <div class="auth-card">
        <div class="auth-header">
            <i class="bi bi-building auth-logo"></i>
            <h3>Meeting Room Booking</h3>
            <p class="text-muted">Silakan login untuk melanjutkan</p>
        </div>
        <form method="POST" class="auth-form">
            <div class="mb-3">
                <label for="username" class="form-label">Username</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="bi bi-person"></i></span>
                    <input type="text" class="form-control" id="username" name="username" placeholder="Masukkan username" required autofocus>
                </div>
            </div>
            <div class="mb-4">
                <label for="password" class="form-label">Password</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="bi bi-lock"></i></span>
                    <input type="password" class="form-control" id="password" name="password" placeholder="Masukkan password" required>
                </div>
            </div>
            <button type="submit" class="btn btn-primary w-100"><i class="bi bi-box-arrow-in-right"></i> Login</button>
        </form>
        <div class="auth-footer">
            Belum punya akun? <a href="{{ url_for('auth.register') }}">Register di sini</a>
        </div>
    </div>
</div>
{% endblock %}
